<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}' {{cspSource}}; img-src {{cspSource}}; font-src {{cspSource}};">
  <link rel="stylesheet" href="{{cssUri}}">
  <title>Claude Office</title>
</head>
<body>
  <div class="office">
    <div class="office-header">
      <div class="office-logo">&#9670;</div>
      <h2 class="office-title">Claude Office</h2>
      <div class="office-status" id="office-status">
        <span class="status-dot status-dot--off"></span>
        <span id="status-text">offline</span>
      </div>
    </div>

    <div class="floor">
      <div class="room" data-room="directors">
        <div class="room-header">
          <span class="room-icon">&#9733;</span>
          <span class="room-label">Directors</span>
        </div>
        <div class="agents"></div>
      </div>
      <div class="room" data-room="backend">
        <div class="room-header">
          <span class="room-icon">&#9881;</span>
          <span class="room-label">Backend</span>
        </div>
        <div class="agents"></div>
      </div>
      <div class="room" data-room="frontend">
        <div class="room-header">
          <span class="room-icon">&#9635;</span>
          <span class="room-label">Frontend</span>
        </div>
        <div class="agents"></div>
      </div>
      <div class="room" data-room="qa">
        <div class="room-header">
          <span class="room-icon">&#10003;</span>
          <span class="room-label">QA Lab</span>
        </div>
        <div class="agents"></div>
      </div>
      <div class="room" data-room="security">
        <div class="room-header">
          <span class="room-icon">&#9737;</span>
          <span class="room-label">Security</span>
        </div>
        <div class="agents"></div>
      </div>
      <div class="room" data-room="devops">
        <div class="room-header">
          <span class="room-icon">&#9654;</span>
          <span class="room-label">DevOps</span>
        </div>
        <div class="agents"></div>
      </div>
      <div class="room" data-room="integrations">
        <div class="room-header">
          <span class="room-icon">&#8644;</span>
          <span class="room-label">Integrations</span>
        </div>
        <div class="agents"></div>
      </div>
      <div class="room" data-room="ai-lab">
        <div class="room-header">
          <span class="room-icon">&#10038;</span>
          <span class="room-label">AI Lab</span>
        </div>
        <div class="agents"></div>
      </div>
      <div class="room room--lobby" data-room="lobby">
        <div class="room-header">
          <span class="room-icon">&#8962;</span>
          <span class="room-label">Lobby</span>
        </div>
        <div class="agents"></div>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-value stat-value--working" id="stat-working">0</span>
        <span class="stat-label">working</span>
      </div>
      <div class="stat">
        <span class="stat-value stat-value--done" id="stat-done">0</span>
        <span class="stat-label">done</span>
      </div>
      <div class="stat">
        <span class="stat-value stat-value--error" id="stat-errors">0</span>
        <span class="stat-label">errors</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-total">0</span>
        <span class="stat-label">total</span>
      </div>
      <div class="stat">
        <span class="stat-value stat-value--session" id="stat-completed">0</span>
        <span class="stat-label">completed</span>
      </div>
    </div>

    <div class="timeline-section">
      <div class="log-header">
        <span class="log-title">Timeline (5 min)</span>
      </div>
      <canvas id="timeline" class="timeline-canvas"></canvas>
    </div>

    <div class="log-header">
      <span class="log-title">Activity Log</span>
      <span class="log-count" id="log-count">0 events</span>
    </div>
    <div class="event-log" id="event-log"></div>
  </div>

  <script nonce="{{nonce}}" src="{{iconsUri}}"></script>
  <script nonce="{{nonce}}" src="{{avatarsUri}}"></script>
  <script nonce="{{nonce}}" src="{{jsUri}}"></script>
</body>
</html>
